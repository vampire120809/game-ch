<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Slide Puzzle</title>
<style>
  body {
    margin: 0;
    background: #f3d1dc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
  }

  #game {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px #c8b6a6;
    text-align: center;
  }

  h1 {
    color: #b5838d;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    grid-template-rows: repeat(4, 70px);
    gap: 5px;
    margin: 20px auto;
  }

  .tile {
    background: #f7c1d9;
    color: #555;
    font-size: 24px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 15px;
    user-select: none;
  }

  .empty {
    background: #eee;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #b5838d;
    color: white;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="game">
  <h1>スライドパズル</h1>
  <div id="board"></div>
  <button onclick="shuffle()">シャッフル</button>
</div>

<script>
const size = 4;
let tiles = [];

function init() {
  tiles = [];
  for (let i = 1; i <= 15; i++) tiles.push(i);
  tiles.push(null); // 空白
  draw();
}

function draw() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  tiles.forEach((num, i) => {
    const div = document.createElement("div");
    div.className = "tile";
    if (num === null) {
      div.classList.add("empty");
    } else {
      div.textContent = num;
      div.onclick = () => move(i);
    }
    board.appendChild(div);
  });
}

function move(index) {
  const emptyIndex = tiles.indexOf(null);
  const row = Math.floor(index / size);
  const col = index % size;
  const erow = Math.floor(emptyIndex / size);
  const ecol = emptyIndex % size;

  if (Math.abs(row - erow) + Math.abs(col - ecol) === 1) {
    [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
    draw();
    checkClear();
  }
}

function shuffle() {
  for (let i = 0; i < 200; i++) {
    const emptyIndex = tiles.indexOf(null);
    const moves = [];
    const row = Math.floor(emptyIndex / size);
    const col = emptyIndex % size;
    if (row > 0) moves.push(emptyIndex - size);
    if (row < size - 1) moves.push(emptyIndex + size);
    if (col > 0) moves.push(emptyIndex - 1);
    if (col < size - 1) moves.push(emptyIndex + 1);
    const r = moves[Math.floor(Math.random() * moves.length)];
    [tiles[emptyIndex], tiles[r]] = [tiles[r], tiles[emptyIndex]];
  }
  draw();
}

function checkClear() {
  for (let i = 0; i < 15; i++) {
    if (tiles[i] !== i + 1) return;
  }
  alert("🎉 クリア！おめでとう！");
}

init();
</script>

</body>
</html>
